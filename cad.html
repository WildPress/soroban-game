<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Parametric soroban board model loaded in JSCAD."
    />
    <title>Parametric Soroban CAD Model</title>
    <style>
      :root {
        color: #eef3f8;
        background: #111417;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-width: 320px;
        min-height: 100svh;
        overflow: hidden;
      }

      header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        padding: 10px 12px;
        border-bottom: 1px solid rgba(238, 243, 248, 0.14);
        background: rgba(8, 10, 12, 0.94);
      }

      h1 {
        margin: 0;
        overflow: hidden;
        font-size: 1rem;
        line-height: 1.15;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      nav {
        display: flex;
        gap: 8px;
      }

      a {
        color: inherit;
      }

      .button-link {
        display: inline-flex;
        min-height: 34px;
        align-items: center;
        padding: 0 12px;
        border-radius: 8px;
        color: #081011;
        background: #d8b25f;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .button-link:hover {
        background: #efc773;
      }

      .viewer {
        position: relative;
        min-height: 0;
      }

      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #ffffff;
      }

      .fallback {
        position: absolute;
        inset: auto 12px 12px 12px;
        max-width: 620px;
        padding: 10px 12px;
        border: 1px solid rgba(238, 243, 248, 0.16);
        border-radius: 8px;
        background: rgba(8, 10, 12, 0.88);
        font-size: 0.88rem;
        line-height: 1.4;
      }

      @media (max-width: 640px) {
        header {
          grid-template-columns: minmax(0, 1fr);
        }

        nav {
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .button-link {
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Parametric Soroban CAD Model</h1>
      <nav aria-label="Model links">
        <a class="button-link" id="open-jscad" target="_blank" rel="noreferrer">Open JSCAD</a>
        <a class="button-link" id="model-source" target="_blank" rel="noreferrer">Model Source</a>
      </nav>
    </header>
    <main class="viewer">
      <iframe id="jscad-frame" title="JSCAD soroban model viewer"></iframe>
      <p class="fallback">
        If the embedded viewer does not load, use <a id="fallback-jscad" target="_blank" rel="noreferrer">Open JSCAD</a>.
      </p>
    </main>
    <script>
      const modelUrl = new URL('soroban-cad.jscad.js', window.location.href);
      const viewerUrl = new URL('https://jscad.app/');

      viewerUrl.hash = modelUrl.href;

      document.getElementById('jscad-frame').src = viewerUrl.href;
      document.getElementById('open-jscad').href = viewerUrl.href;
      document.getElementById('fallback-jscad').href = viewerUrl.href;
      document.getElementById('model-source').href = modelUrl.href;
    </script>
  </body>
</html>
