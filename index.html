<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soroban Prototype</title>
  </head>
  <body>
    <main class="app-shell" aria-label="Soroban prototype">
      <section class="status-strip">
        <div>
          <span class="label">Columns</span>
          <input id="columns" type="number" min="1" max="21" value="13" />
        </div>
        <div>
          <span class="label">Theme</span>
          <select id="theme">
            <option value="walnut">Walnut</option>
            <option value="ash">Ash</option>
            <option value="slate">Slate</option>
          </select>
        </div>
        <div>
          <span class="label">Total</span>
          <strong id="total">0</strong>
        </div>
        <div>
          <span class="label">Format</span>
          <strong>1:4</strong>
        </div>
      </section>

      <canvas id="soroban-canvas" class="soroban-canvas" aria-label="Interactive soroban"></canvas>

      <section class="control-panel">
        <header>
          <h1>Soroban Prototype</h1>
          <div class="actions">
            <a class="button-link" href="/cad.html">CAD</a>
            <button id="randomize" type="button">Random</button>
            <button id="reset" type="button">Reset</button>
          </div>
        </header>
        <div id="column-controls" class="column-controls" aria-label="Column values"></div>
      </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
